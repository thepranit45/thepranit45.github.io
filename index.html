<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Upload Platform</title>
<style>
    body {
        background-color: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
    }
    input, button {
        margin: 10px;
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(145deg, #222, #444);
        color: #0ff;
        cursor: pointer;
        font-size: 16px;
    }
    input:hover, button:hover { background: #555; }
    .file-list img {
        width: 150px;
        margin: 10px;
        border-radius: 8px;
        border: 2px solid #0ff;
    }
    .file-list a {
        display: block;
        margin: 5px;
        color: #0ff;
        text-decoration: none;
    }
</style>
</head>
<body>
<h1>Upload Files</h1>
<input type="file" id="fileInput" multiple>
<button onclick="uploadFiles()">Upload</button>

<h2>Uploaded Files</h2>
<div class="file-list" id="fileList"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>

<script>
  // Firebase configuration
  const firebaseConfig = {
    apiKey: "<YOUR_API_KEY>",
    authDomain: "<YOUR_PROJECT_ID>.firebaseapp.com",
    projectId: "<YOUR_PROJECT_ID>",
    storageBucket: "<YOUR_PROJECT_ID>.appspot.com",
    messagingSenderId: "<YOUR_MESSAGING_SENDER_ID>",
    appId: "<YOUR_APP_ID>"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const storage = firebase.storage();
  const db = firebase.firestore();

  // Upload function
  async function uploadFiles() {
    const files = document.getElementById('fileInput').files;
    if (!files.length) return alert("Select files first!");

    for (let file of files) {
        const storageRef = storage.ref('uploads/' + Date.now() + '_' + file.name);
        await storageRef.put(file);
        const url = await storageRef.getDownloadURL();
        await db.collection('files').add({
            name: file.name,
            type: file.type,
            url: url,
            timestamp: Date.now()
        });
    }

    alert('Files uploaded!');
    loadFiles();
  }

  // Load uploaded files
  async function loadFiles() {
    const snapshot = await db.collection('files').orderBy('timestamp', 'desc').get();
    const fileList = document.getElementById('fileList');
    fileList.innerHTML = '';

    snapshot.docs.forEach(doc => {
        const file = doc.data();
        if (file.type.startsWith('image/')) {
            fileList.innerHTML += `<a href="${file.url}" target="_blank"><img src="${file.url}" alt="${file.name}"></a>`;
        } else {
            fileList.innerHTML += `<a href="${file.url}" target="_blank">${file.name}</a>`;
        }
    });
  }

  loadFiles(); // Load files on page load
</script>
</body>
</html>
