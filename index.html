  const dbx = new Dropbox.Dropbox({ accessToken: ACCESS_TOKEN, fetch: fetch });

  async function uploadFiles() {
    const files = document.getElementById('fileInput').files;
    if (!files.length) return alert("Select files first!");

    for (let file of files) {
        const path = '/' + file.name;
        try {
            await dbx.filesUpload({ path: path, contents: file, mode: 'overwrite' });
            const sharedLink = await dbx.sharingCreateSharedLinkWithSettings({ path: path });
            addFileToList(sharedLink.url, file);
        } catch (error) {
            console.error(error);
        }
    }
    alert("Files uploaded!");
  }

  function addFileToList(url, file) {
    const fileList = document.getElementById('fileList');
    let displayUrl = url.replace('?dl=0', '?raw=1'); // direct file display
    if (file.type.startsWith('image/')) {
        fileList.innerHTML += `<a href="${url}" target="_blank"><img src="${displayUrl}" alt="${file.name}"></a>`;
    } else {
        fileList.innerHTML += `<a href="${url}" target="_blank">${file.name}</a>`;
    }
  }
