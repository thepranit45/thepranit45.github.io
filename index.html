<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranit's Portal</title>
<style>
body { background-color: #121212; color: #fff; font-family: Arial, sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; }
.profile { text-align:center; margin-bottom:30px; }
.profile img { width:150px; height:150px; border-radius:50%; border:3px solid #fff; margin-bottom:10px; }
.profile h1 { margin-bottom:10px; }
.social-buttons a { margin:5px; padding:10px 20px; background:linear-gradient(45deg,#ff0080,#7928ca); color:#fff; text-decoration:none; border-radius:8px; transition:transform 0.2s; }
.social-buttons a:hover { transform:scale(1.1); }
.upload-section { margin-top:30px; text-align:center; }
.file-preview { display:flex; flex-wrap:wrap; margin-top:20px; }
.file-preview div { background:#1e1e1e; padding:10px; margin:5px; border-radius:6px; max-width:150px; word-wrap:break-word; text-align:center; }
</style>
</head>
<body>

<div class="profile">
    <img src="your-photo.jpg" alt="Pranit Gopale">
    <h1>Pranit Gopale</h1>
    <div class="social-buttons">
        <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a>
        <a href="https://github.com/yourprofile" target="_blank">GitHub</a>
        <a href="https://youtube.com/yourchannel" target="_blank">YouTube</a>
        <a href="https://instagram.com/yourprofile" target="_blank">Instagram</a>
    </div>
</div>

<div class="upload-section">
    <h2>Upload Files</h2>
    <input type="file" id="fileInput" multiple>
    <button onclick="uploadFiles()">Upload</button>
    <div class="file-preview" id="filePreview"></div>
</div>

<script>
async function uploadFiles() {
    const files = document.getElementById('fileInput').files;
    if(files.length === 0) return alert("Please select files!");
    
    const formData = new FormData();
    for (let i=0; i<files.length; i++) {
        if(files[i].size > 8*1024*1024) {
            alert(files[i].name + " exceeds 8MB!");
            return;
        }
        formData.append('files', files[i]);
    }

    // Replace with your deployed backend URL
    const res = await fetch('http://localhost:3000/upload', {
        method: 'POST',
        body: formData
    });

    const result = await res.json();
    if(result.success) {
        const preview = document.getElementById('filePreview');
        preview.innerHTML = '';
        result.files.forEach(f => {
            const div = document.createElement('div');
            div.innerHTML = `<a href="${f.url}" target="_blank">${f.name}</a>`;
            preview.appendChild(div);
        });
    } else {
        alert("Upload failed: " + result.error);
    }
}
</script>

</body>
</html>
